<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>MobilityDB Ecosystem</title>
  <desc>Architecture diagram. MEOS (canonical C library) at the center; SQL layers (MobilityDB, MobilityDuck), HTTP/API (MobilityAPI), and language bindings (PyMEOS, JMEOS, meos-rs, GoMEOS, MEOS.NET, MEOS.js) as peer layers above; MEOS-API as a side codegen pipeline; application platforms, visualization, and cloud deployment as the upper layer.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowDotted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a16207"/>
    </marker>
  </defs>

  <text x="600" y="30" text-anchor="middle" font-size="20" font-weight="600" fill="#1f2937">MobilityDB Ecosystem</text>

  <!-- Application layer -->
  <rect x="60" y="55" width="1080" height="105" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="2"/>
  <text x="600" y="78" text-anchor="middle" font-size="14" font-weight="700" fill="#713f12">Application Layer</text>
  <text x="280" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#713f12">Platforms</text>
  <text x="280" y="118" text-anchor="middle" font-size="10" fill="#713f12">Spark · Flink · Kafka · Nebula</text>
  <text x="280" y="132" text-anchor="middle" font-size="10" fill="#713f12">Pandas · OpenTripPlanner · MapMatching</text>
  <text x="600" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412">Visualization</text>
  <text x="600" y="118" text-anchor="middle" font-size="10" fill="#9a3412">Deck · OpenLayers · Leaflet</text>
  <text x="600" y="132" text-anchor="middle" font-size="10" fill="#9a3412">QGIS · GeoServer · move</text>
  <text x="900" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#0e7490">Cloud Deployment</text>
  <text x="900" y="118" text-anchor="middle" font-size="10" fill="#0e7490">AWS · Azure · GCP · docker</text>

  <!-- Application -> mid-layer arrows -->
  <line x1="280" y1="160" x2="280" y2="200" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="160" x2="600" y2="200" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="900" y1="160" x2="900" y2="200" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SQL Layers -->
  <rect x="60" y="200" width="280" height="120" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="200" y="223" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">SQL Layers (peers)</text>
  <rect x="80" y="240" width="240" height="28" rx="4" fill="#2563eb"/>
  <text x="200" y="259" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">MobilityDB · PostgreSQL</text>
  <rect x="80" y="278" width="240" height="28" rx="4" fill="#2563eb"/>
  <text x="200" y="297" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">MobilityDuck · DuckDB</text>

  <!-- HTTP / API -->
  <rect x="380" y="200" width="200" height="120" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="480" y="223" text-anchor="middle" font-size="13" font-weight="700" fill="#064e3b">HTTP / API</text>
  <rect x="400" y="252" width="160" height="28" rx="4" fill="#10b981"/>
  <text x="480" y="271" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">MobilityAPI</text>
  <text x="480" y="298" text-anchor="middle" font-size="10" fill="#064e3b">OGC API – Moving Features</text>

  <!-- Language Bindings -->
  <rect x="620" y="200" width="520" height="120" rx="8" fill="#f3e8ff" stroke="#a855f7" stroke-width="2"/>
  <text x="880" y="223" text-anchor="middle" font-size="13" font-weight="700" fill="#4c1d95">Language Bindings</text>
  <rect x="640" y="240" width="100" height="28" rx="4" fill="#a855f7"/>
  <text x="690" y="259" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">PyMEOS</text>
  <rect x="750" y="240" width="100" height="28" rx="4" fill="#a855f7"/>
  <text x="800" y="259" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">JMEOS</text>
  <rect x="860" y="240" width="100" height="28" rx="4" fill="#a855f7"/>
  <text x="910" y="259" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">meos-rs</text>
  <rect x="970" y="240" width="150" height="28" rx="4" fill="#a855f7"/>
  <text x="1045" y="259" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">GoMEOS</text>
  <rect x="640" y="278" width="240" height="28" rx="4" fill="#a855f7"/>
  <text x="760" y="297" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">MEOS.NET</text>
  <rect x="890" y="278" width="230" height="28" rx="4" fill="#a855f7"/>
  <text x="1005" y="297" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">MEOS.js</text>

  <!-- Mid-layer -> MEOS arrows -->
  <line x1="200" y1="320" x2="430" y2="380" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="320" x2="600" y2="380" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="880" y1="320" x2="770" y2="380" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- MEOS core -->
  <rect x="380" y="380" width="440" height="100" rx="8" fill="#1f2937" stroke="#0f172a" stroke-width="2"/>
  <text x="600" y="412" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">MEOS</text>
  <text x="600" y="436" text-anchor="middle" font-size="13" fill="#cbd5e1">Mobility Engine, Open Source — C library</text>
  <text x="600" y="458" text-anchor="middle" font-size="11" fill="#94a3b8">canonical implementation</text>

  <!-- MEOS-API (left of MEOS) -->
  <rect x="60" y="380" width="280" height="100" rx="8" fill="#fef3c7" stroke="#a16207" stroke-width="2"/>
  <text x="200" y="408" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">MEOS-API</text>
  <text x="200" y="430" text-anchor="middle" font-size="11" fill="#78350f">codegen catalog</text>
  <text x="200" y="448" text-anchor="middle" font-size="10" fill="#92400e">meos-api.json from MEOS headers</text>
  <text x="200" y="466" text-anchor="middle" font-size="10" fill="#92400e">consumed by language bindings</text>

  <!-- MEOS-API -> Bindings (codegen, dotted) -->
  <path d="M 340 400 Q 470 350 620 290" stroke="#a16207" stroke-width="1.5" stroke-dasharray="6,4" fill="none" marker-end="url(#arrowDotted)"/>
  <text x="450" y="350" font-size="10" fill="#a16207" font-style="italic">codegen pipeline</text>

  <!-- Legend (right of MEOS) -->
  <rect x="860" y="380" width="280" height="100" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="870" y="400" font-size="11" font-weight="700" fill="#1e293b">Layer colors</text>
  <rect x="870" y="408" width="12" height="12" rx="2" fill="#1f2937"/>
  <text x="888" y="418" font-size="10" fill="#1e293b">Core (MEOS)</text>
  <rect x="870" y="424" width="12" height="12" rx="2" fill="#2563eb"/>
  <text x="888" y="434" font-size="10" fill="#1e293b">SQL layers</text>
  <rect x="870" y="440" width="12" height="12" rx="2" fill="#10b981"/>
  <text x="888" y="450" font-size="10" fill="#1e293b">HTTP / API</text>
  <rect x="870" y="456" width="12" height="12" rx="2" fill="#a855f7"/>
  <text x="888" y="466" font-size="10" fill="#1e293b">Language bindings</text>
  <rect x="990" y="408" width="12" height="12" rx="2" fill="#a16207"/>
  <text x="1008" y="418" font-size="10" fill="#1e293b">Tooling</text>
  <rect x="990" y="424" width="12" height="12" rx="2" fill="#eab308"/>
  <text x="1008" y="434" font-size="10" fill="#1e293b">Application</text>
  <rect x="990" y="440" width="12" height="12" rx="2" fill="#f97316"/>
  <text x="1008" y="450" font-size="10" fill="#1e293b">Visualization</text>
  <rect x="990" y="456" width="12" height="12" rx="2" fill="#0891b2"/>
  <text x="1008" y="466" font-size="10" fill="#1e293b">Cloud</text>
</svg>
