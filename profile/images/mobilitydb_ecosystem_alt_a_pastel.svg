<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>MobilityDB Ecosystem</title>
  <desc>Architecture diagram. MEOS (canonical C library) at the center; SQL layers (MobilityDB, MobilityDuck), HTTP/API (MobilityAPI), and language bindings (PyMEOS, JMEOS, meos-rs, GoMEOS, MEOS.NET, MEOS.js) as peer layers above; MEOS-API as a side codegen pipeline; application platforms, visualization, and cloud deployment as the upper layer.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowDotted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
  </defs>

  <text x="600" y="30" text-anchor="middle" font-size="20" font-weight="600" fill="#334155">MobilityDB Ecosystem</text>

  <!-- Application platforms (pastel yellow) -->
  <rect x="60" y="55" width="360" height="105" rx="10" fill="#fefce8" stroke="#fde047" stroke-width="2"/>
  <text x="240" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#854d0e">Application Platforms</text>
  <text x="240" y="102" text-anchor="middle" font-size="11" fill="#713f12">Spark · Flink · Kafka · Nebula</text>
  <text x="240" y="124" text-anchor="middle" font-size="11" fill="#713f12">Pandas · OpenTripPlanner</text>
  <text x="240" y="142" text-anchor="middle" font-size="11" fill="#713f12">MapMatching · PySpark</text>

  <!-- Visualization (pastel orange) -->
  <rect x="440" y="55" width="320" height="105" rx="10" fill="#ffedd5" stroke="#fdba74" stroke-width="2"/>
  <text x="600" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">Visualization</text>
  <text x="600" y="102" text-anchor="middle" font-size="11" fill="#7c2d12">Deck · OpenLayers · Leaflet</text>
  <text x="600" y="124" text-anchor="middle" font-size="11" fill="#7c2d12">QGIS · GeoServer · move</text>

  <!-- Cloud (pastel cyan) -->
  <rect x="780" y="55" width="360" height="105" rx="10" fill="#cffafe" stroke="#67e8f9" stroke-width="2"/>
  <text x="960" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#155e75">Cloud Deployment</text>
  <text x="960" y="102" text-anchor="middle" font-size="11" fill="#164e63">AWS · Azure · GCP</text>
  <text x="960" y="124" text-anchor="middle" font-size="11" fill="#164e63">docker</text>

  <!-- Application -> mid-layer arrows -->
  <line x1="240" y1="160" x2="200" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="160" x2="480" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="960" y1="160" x2="880" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SQL Layers (pastel blue) -->
  <rect x="60" y="200" width="280" height="120" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="2"/>
  <text x="200" y="225" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">SQL Layers (peers)</text>
  <rect x="80" y="240" width="240" height="28" rx="6" fill="#bfdbfe" stroke="#60a5fa" stroke-width="1"/>
  <text x="200" y="259" text-anchor="middle" font-size="12" fill="#1e3a8a" font-weight="600">MobilityDB · PostgreSQL</text>
  <rect x="80" y="278" width="240" height="28" rx="6" fill="#bfdbfe" stroke="#60a5fa" stroke-width="1"/>
  <text x="200" y="297" text-anchor="middle" font-size="12" fill="#1e3a8a" font-weight="600">MobilityDuck · DuckDB</text>

  <!-- HTTP / API (pastel emerald) -->
  <rect x="380" y="200" width="200" height="120" rx="10" fill="#d1fae5" stroke="#6ee7b7" stroke-width="2"/>
  <text x="480" y="225" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">HTTP / API</text>
  <rect x="400" y="252" width="160" height="28" rx="6" fill="#a7f3d0" stroke="#34d399" stroke-width="1"/>
  <text x="480" y="271" text-anchor="middle" font-size="12" fill="#064e3b" font-weight="600">MobilityAPI</text>
  <text x="480" y="298" text-anchor="middle" font-size="10" fill="#065f46">OGC API – Moving Features</text>

  <!-- Language Bindings (pastel violet) -->
  <rect x="620" y="200" width="520" height="120" rx="10" fill="#ede9fe" stroke="#c4b5fd" stroke-width="2"/>
  <text x="880" y="225" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">Language Bindings</text>
  <rect x="640" y="240" width="100" height="28" rx="6" fill="#ddd6fe" stroke="#a78bfa" stroke-width="1"/>
  <text x="690" y="259" text-anchor="middle" font-size="11" fill="#4c1d95" font-weight="600">PyMEOS</text>
  <rect x="750" y="240" width="100" height="28" rx="6" fill="#ddd6fe" stroke="#a78bfa" stroke-width="1"/>
  <text x="800" y="259" text-anchor="middle" font-size="11" fill="#4c1d95" font-weight="600">JMEOS</text>
  <rect x="860" y="240" width="100" height="28" rx="6" fill="#ddd6fe" stroke="#a78bfa" stroke-width="1"/>
  <text x="910" y="259" text-anchor="middle" font-size="11" fill="#4c1d95" font-weight="600">meos-rs</text>
  <rect x="970" y="240" width="150" height="28" rx="6" fill="#ddd6fe" stroke="#a78bfa" stroke-width="1"/>
  <text x="1045" y="259" text-anchor="middle" font-size="11" fill="#4c1d95" font-weight="600">GoMEOS</text>
  <rect x="640" y="278" width="240" height="28" rx="6" fill="#ddd6fe" stroke="#a78bfa" stroke-width="1"/>
  <text x="760" y="297" text-anchor="middle" font-size="11" fill="#4c1d95" font-weight="600">MEOS.NET</text>
  <rect x="890" y="278" width="230" height="28" rx="6" fill="#ddd6fe" stroke="#a78bfa" stroke-width="1"/>
  <text x="1005" y="297" text-anchor="middle" font-size="11" fill="#4c1d95" font-weight="600">MEOS.js</text>

  <!-- Mid-layer -> MEOS arrows -->
  <line x1="200" y1="320" x2="430" y2="380" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="320" x2="600" y2="380" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="880" y1="320" x2="770" y2="380" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- MEOS core (pastel indigo, anchoring) -->
  <rect x="380" y="380" width="440" height="100" rx="10" fill="#c7d2fe" stroke="#818cf8" stroke-width="2"/>
  <text x="600" y="412" text-anchor="middle" font-size="22" font-weight="700" fill="#312e81">MEOS</text>
  <text x="600" y="436" text-anchor="middle" font-size="13" fill="#3730a3">Mobility Engine, Open Source — C library</text>
  <text x="600" y="458" text-anchor="middle" font-size="11" fill="#4338ca">canonical implementation</text>

  <!-- MEOS-API (pastel amber, off to the side) -->
  <rect x="60" y="380" width="280" height="100" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
  <text x="200" y="408" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">MEOS-API</text>
  <text x="200" y="430" text-anchor="middle" font-size="11" fill="#78350f">codegen catalog</text>
  <text x="200" y="448" text-anchor="middle" font-size="10" fill="#92400e">meos-api.json from MEOS headers</text>
  <text x="200" y="466" text-anchor="middle" font-size="10" fill="#92400e">consumed by language bindings</text>

  <!-- MEOS-API -> Bindings (codegen, dotted) -->
  <path d="M 340 400 Q 470 350 620 290" stroke="#d97706" stroke-width="1.5" stroke-dasharray="6,4" fill="none" marker-end="url(#arrowDotted)"/>
  <text x="450" y="350" font-size="10" fill="#b45309" font-style="italic">codegen pipeline</text>

  <!-- Legend (right of MEOS) -->
  <rect x="860" y="380" width="280" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="870" y="400" font-size="11" font-weight="700" fill="#334155">Layer colors</text>
  <rect x="870" y="408" width="12" height="12" rx="2" fill="#c7d2fe" stroke="#818cf8"/>
  <text x="888" y="418" font-size="10" fill="#334155">Core (MEOS)</text>
  <rect x="870" y="424" width="12" height="12" rx="2" fill="#bfdbfe" stroke="#60a5fa"/>
  <text x="888" y="434" font-size="10" fill="#334155">SQL layers</text>
  <rect x="870" y="440" width="12" height="12" rx="2" fill="#a7f3d0" stroke="#34d399"/>
  <text x="888" y="450" font-size="10" fill="#334155">HTTP / API</text>
  <rect x="870" y="456" width="12" height="12" rx="2" fill="#ddd6fe" stroke="#a78bfa"/>
  <text x="888" y="466" font-size="10" fill="#334155">Language bindings</text>
  <rect x="990" y="408" width="12" height="12" rx="2" fill="#fde68a" stroke="#fcd34d"/>
  <text x="1008" y="418" font-size="10" fill="#334155">Tooling</text>
  <rect x="990" y="424" width="12" height="12" rx="2" fill="#fefce8" stroke="#fde047"/>
  <text x="1008" y="434" font-size="10" fill="#334155">Application</text>
  <rect x="990" y="440" width="12" height="12" rx="2" fill="#ffedd5" stroke="#fdba74"/>
  <text x="1008" y="450" font-size="10" fill="#334155">Visualization</text>
  <rect x="990" y="456" width="12" height="12" rx="2" fill="#cffafe" stroke="#67e8f9"/>
  <text x="1008" y="466" font-size="10" fill="#334155">Cloud</text>
</svg>
