<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>MobilityDB Ecosystem — alt B (icons with family-colored backgrounds)</title>
  <desc>Architecture diagram with each project represented as an icon circle, where the icon's background is tinted with its family's pastel color. This is the layout to use as a starting point for replacing the circular placeholders with the real project logos in draw.io.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowDotted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
    <!-- Reusable "icon tile" — replace the <circle> with the real logo when porting to draw.io -->
  </defs>

  <text x="600" y="30" text-anchor="middle" font-size="20" font-weight="600" fill="#334155">MobilityDB Ecosystem</text>
  <text x="600" y="50" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">Each colored circle is a placeholder for the project's actual logo; background carries the family color.</text>

  <!-- ============================================================
       APPLICATION LAYER (top)
       ============================================================ -->

  <!-- Application Platforms (yellow) -->
  <text x="170" y="92" text-anchor="middle" font-size="12" font-weight="700" fill="#854d0e">Application Platforms</text>
  <g transform="translate(80, 100)">
    <circle cx="20" cy="20" r="20" fill="#fefce8" stroke="#fde047" stroke-width="2"/><text x="20" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#854d0e">Sp</text>
    <circle cx="65" cy="20" r="20" fill="#fefce8" stroke="#fde047" stroke-width="2"/><text x="65" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#854d0e">Fl</text>
    <circle cx="110" cy="20" r="20" fill="#fefce8" stroke="#fde047" stroke-width="2"/><text x="110" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#854d0e">Ka</text>
    <circle cx="155" cy="20" r="20" fill="#fefce8" stroke="#fde047" stroke-width="2"/><text x="155" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#854d0e">Ne</text>
    <circle cx="200" cy="20" r="20" fill="#fefce8" stroke="#fde047" stroke-width="2"/><text x="200" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#854d0e">Pa</text>
    <text x="20" y="58" text-anchor="middle" font-size="9" fill="#713f12">Spark</text>
    <text x="65" y="58" text-anchor="middle" font-size="9" fill="#713f12">Flink</text>
    <text x="110" y="58" text-anchor="middle" font-size="9" fill="#713f12">Kafka</text>
    <text x="155" y="58" text-anchor="middle" font-size="9" fill="#713f12">Nebula</text>
    <text x="200" y="58" text-anchor="middle" font-size="9" fill="#713f12">Pandas</text>
    <circle cx="20" cy="85" r="20" fill="#fefce8" stroke="#fde047" stroke-width="2"/><text x="20" y="90" text-anchor="middle" font-size="11" font-weight="700" fill="#854d0e">OT</text>
    <circle cx="65" cy="85" r="20" fill="#fefce8" stroke="#fde047" stroke-width="2"/><text x="65" y="90" text-anchor="middle" font-size="11" font-weight="700" fill="#854d0e">MM</text>
    <circle cx="110" cy="85" r="20" fill="#fefce8" stroke="#fde047" stroke-width="2"/><text x="110" y="90" text-anchor="middle" font-size="11" font-weight="700" fill="#854d0e">PS</text>
    <text x="20" y="123" text-anchor="middle" font-size="9" fill="#713f12">OTPlanner</text>
    <text x="65" y="123" text-anchor="middle" font-size="9" fill="#713f12">MapMatch</text>
    <text x="110" y="123" text-anchor="middle" font-size="9" fill="#713f12">PySpark</text>
  </g>

  <!-- Visualization (orange) -->
  <text x="600" y="92" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412">Visualization</text>
  <g transform="translate(440, 100)">
    <circle cx="20" cy="20" r="20" fill="#ffedd5" stroke="#fdba74" stroke-width="2"/><text x="20" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412">Dk</text>
    <circle cx="75" cy="20" r="20" fill="#ffedd5" stroke="#fdba74" stroke-width="2"/><text x="75" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412">OL</text>
    <circle cx="130" cy="20" r="20" fill="#ffedd5" stroke="#fdba74" stroke-width="2"/><text x="130" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412">Lf</text>
    <circle cx="185" cy="20" r="20" fill="#ffedd5" stroke="#fdba74" stroke-width="2"/><text x="185" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412">QG</text>
    <circle cx="240" cy="20" r="20" fill="#ffedd5" stroke="#fdba74" stroke-width="2"/><text x="240" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412">GS</text>
    <circle cx="295" cy="20" r="20" fill="#ffedd5" stroke="#fdba74" stroke-width="2"/><text x="295" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412">mv</text>
    <text x="20" y="58" text-anchor="middle" font-size="9" fill="#7c2d12">Deck</text>
    <text x="75" y="58" text-anchor="middle" font-size="9" fill="#7c2d12">OpenLayers</text>
    <text x="130" y="58" text-anchor="middle" font-size="9" fill="#7c2d12">Leaflet</text>
    <text x="185" y="58" text-anchor="middle" font-size="9" fill="#7c2d12">QGIS</text>
    <text x="240" y="58" text-anchor="middle" font-size="9" fill="#7c2d12">GeoServer</text>
    <text x="295" y="58" text-anchor="middle" font-size="9" fill="#7c2d12">move</text>
  </g>

  <!-- Cloud (cyan) -->
  <text x="990" y="92" text-anchor="middle" font-size="12" font-weight="700" fill="#155e75">Cloud Deployment</text>
  <g transform="translate(880, 100)">
    <circle cx="20" cy="20" r="20" fill="#cffafe" stroke="#67e8f9" stroke-width="2"/><text x="20" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#155e75">AWS</text>
    <circle cx="75" cy="20" r="20" fill="#cffafe" stroke="#67e8f9" stroke-width="2"/><text x="75" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#155e75">Az</text>
    <circle cx="130" cy="20" r="20" fill="#cffafe" stroke="#67e8f9" stroke-width="2"/><text x="130" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#155e75">GCP</text>
    <circle cx="185" cy="20" r="20" fill="#cffafe" stroke="#67e8f9" stroke-width="2"/><text x="185" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#155e75">🐳</text>
    <text x="20" y="58" text-anchor="middle" font-size="9" fill="#164e63">AWS</text>
    <text x="75" y="58" text-anchor="middle" font-size="9" fill="#164e63">Azure</text>
    <text x="130" y="58" text-anchor="middle" font-size="9" fill="#164e63">GCP</text>
    <text x="185" y="58" text-anchor="middle" font-size="9" fill="#164e63">docker</text>
  </g>

  <!-- ============================================================
       Arrows from app layer down to mid layer
       ============================================================ -->
  <line x1="170" y1="245" x2="200" y2="295" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="170" x2="480" y2="295" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="990" y1="170" x2="200" y2="305" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- ============================================================
       MIDDLE LAYER
       ============================================================ -->

  <!-- SQL Layers (blue) -->
  <text x="200" y="287" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">SQL Layers (peers)</text>
  <g transform="translate(80, 300)">
    <circle cx="50" cy="25" r="25" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/><text x="50" y="31" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">M</text>
    <text x="50" y="68" text-anchor="middle" font-size="10" fill="#1e3a8a" font-weight="600">MobilityDB</text>
    <text x="50" y="82" text-anchor="middle" font-size="9" fill="#1e40af">PostgreSQL</text>
    <circle cx="180" cy="25" r="25" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/><text x="180" y="31" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">MD</text>
    <text x="180" y="68" text-anchor="middle" font-size="10" fill="#1e3a8a" font-weight="600">MobilityDuck</text>
    <text x="180" y="82" text-anchor="middle" font-size="9" fill="#1e40af">DuckDB</text>
  </g>

  <!-- HTTP / API (green) -->
  <text x="480" y="287" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">HTTP / API</text>
  <g transform="translate(380, 300)">
    <circle cx="100" cy="25" r="25" fill="#d1fae5" stroke="#34d399" stroke-width="2"/><text x="100" y="31" text-anchor="middle" font-size="11" font-weight="700" fill="#064e3b">API</text>
    <text x="100" y="68" text-anchor="middle" font-size="10" fill="#064e3b" font-weight="600">MobilityAPI</text>
    <text x="100" y="82" text-anchor="middle" font-size="9" fill="#065f46">OGC – Moving Features</text>
  </g>

  <!-- Language Bindings (violet) -->
  <text x="880" y="287" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">Language Bindings</text>
  <g transform="translate(620, 300)">
    <circle cx="40" cy="25" r="22" fill="#ede9fe" stroke="#a78bfa" stroke-width="2"/><text x="40" y="30" text-anchor="middle" font-size="11" font-weight="700" fill="#4c1d95">Py</text>
    <text x="40" y="65" text-anchor="middle" font-size="9" fill="#4c1d95">PyMEOS</text>
    <circle cx="120" cy="25" r="22" fill="#ede9fe" stroke="#a78bfa" stroke-width="2"/><text x="120" y="30" text-anchor="middle" font-size="11" font-weight="700" fill="#4c1d95">J</text>
    <text x="120" y="65" text-anchor="middle" font-size="9" fill="#4c1d95">JMEOS</text>
    <circle cx="200" cy="25" r="22" fill="#ede9fe" stroke="#a78bfa" stroke-width="2"/><text x="200" y="30" text-anchor="middle" font-size="11" font-weight="700" fill="#4c1d95">Rs</text>
    <text x="200" y="65" text-anchor="middle" font-size="9" fill="#4c1d95">meos-rs</text>
    <circle cx="280" cy="25" r="22" fill="#ede9fe" stroke="#a78bfa" stroke-width="2"/><text x="280" y="30" text-anchor="middle" font-size="11" font-weight="700" fill="#4c1d95">Go</text>
    <text x="280" y="65" text-anchor="middle" font-size="9" fill="#4c1d95">GoMEOS</text>
    <circle cx="360" cy="25" r="22" fill="#ede9fe" stroke="#a78bfa" stroke-width="2"/><text x="360" y="30" text-anchor="middle" font-size="11" font-weight="700" fill="#4c1d95">.N</text>
    <text x="360" y="65" text-anchor="middle" font-size="9" fill="#4c1d95">MEOS.NET</text>
    <circle cx="440" cy="25" r="22" fill="#ede9fe" stroke="#a78bfa" stroke-width="2"/><text x="440" y="30" text-anchor="middle" font-size="11" font-weight="700" fill="#4c1d95">.js</text>
    <text x="440" y="65" text-anchor="middle" font-size="9" fill="#4c1d95">MEOS.js</text>
  </g>

  <!-- ============================================================
       Mid -> MEOS arrows
       ============================================================ -->
  <line x1="200" y1="395" x2="450" y2="455" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="395" x2="600" y2="455" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="880" y1="395" x2="750" y2="455" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============================================================
       MEOS core (pastel indigo)
       ============================================================ -->
  <g transform="translate(420, 455)">
    <circle cx="180" cy="55" r="55" fill="#c7d2fe" stroke="#818cf8" stroke-width="3"/>
    <text x="180" y="50" text-anchor="middle" font-size="20" font-weight="700" fill="#312e81">MEOS</text>
    <text x="180" y="68" text-anchor="middle" font-size="9" fill="#3730a3">C library</text>
    <text x="180" y="82" text-anchor="middle" font-size="8" fill="#4338ca">canonical</text>
  </g>

  <!-- ============================================================
       MEOS-API tooling (pastel amber, off to the left)
       ============================================================ -->
  <g transform="translate(80, 475)">
    <circle cx="40" cy="40" r="35" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
    <text x="40" y="38" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">API</text>
    <text x="40" y="51" text-anchor="middle" font-size="8" fill="#78350f">.json</text>
    <text x="170" y="32" font-size="11" font-weight="700" fill="#92400e">MEOS-API</text>
    <text x="170" y="48" font-size="9" fill="#78350f">codegen catalog (meos-api.json)</text>
    <text x="170" y="62" font-size="9" fill="#92400e">consumed by language bindings</text>
  </g>

  <!-- MEOS-API -> Bindings (codegen, dotted) -->
  <path d="M 130 480 Q 350 410 660 350" stroke="#d97706" stroke-width="1.5" stroke-dasharray="6,4" fill="none" marker-end="url(#arrowDotted)"/>
  <text x="320" y="430" font-size="10" fill="#b45309" font-style="italic">codegen pipeline</text>

  <!-- ============================================================
       Legend (right, below MEOS)
       ============================================================ -->
  <rect x="860" y="475" width="280" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="870" y="495" font-size="11" font-weight="700" fill="#334155">Family colors (icon backgrounds)</text>
  <circle cx="880" cy="510" r="7" fill="#c7d2fe" stroke="#818cf8"/><text x="893" y="514" font-size="10" fill="#334155">Core (MEOS)</text>
  <circle cx="880" cy="528" r="7" fill="#dbeafe" stroke="#60a5fa"/><text x="893" y="532" font-size="10" fill="#334155">SQL layers</text>
  <circle cx="880" cy="546" r="7" fill="#d1fae5" stroke="#34d399"/><text x="893" y="550" font-size="10" fill="#334155">HTTP / API</text>
  <circle cx="880" cy="564" r="7" fill="#ede9fe" stroke="#a78bfa"/><text x="893" y="568" font-size="10" fill="#334155">Language bindings</text>
  <circle cx="880" cy="582" r="7" fill="#fef3c7" stroke="#fcd34d"/><text x="893" y="586" font-size="10" fill="#334155">Tooling</text>
  <circle cx="1010" cy="510" r="7" fill="#fefce8" stroke="#fde047"/><text x="1023" y="514" font-size="10" fill="#334155">Application</text>
  <circle cx="1010" cy="528" r="7" fill="#ffedd5" stroke="#fdba74"/><text x="1023" y="532" font-size="10" fill="#334155">Visualization</text>
  <circle cx="1010" cy="546" r="7" fill="#cffafe" stroke="#67e8f9"/><text x="1023" y="550" font-size="10" fill="#334155">Cloud</text>
</svg>
